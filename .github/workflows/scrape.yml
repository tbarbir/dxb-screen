name: Dubai Property Price Drop Tracker

on:
  schedule:
    - cron: '0 22 * * *'
    - cron: '0 4  * * *'
    - cron: '0 10 * * *'
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run scraper
        run: node scraper.js
        env:
          CI: true
          DDA_APP_ID: ${{ secrets.DDA_APP_ID }}
          DDA_SECURITY_ID: ${{ secrets.DDA_SECURITY_ID }}
          DDA_CLIENT_ID: ${{ secrets.DDA_CLIENT_ID }}
          DDA_CLIENT_SECRET: ${{ secrets.DDA_CLIENT_SECRET }}

      - name: Commit updated data
        run: |
          git config user.name  "GPI Scraper Bot"
          git config user.email "bot@gulf-price-intelligence.local"
          git add data/listings.json data/drops.json data/stats.json data/benchmarks.json data/transactions.json
          git diff --staged --quiet || git commit -m "scrape: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
